<ion-header>
  <ion-toolbar>
    <ion-title>To-Do</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <ion-item>
    <ion-input
      label="Nueva tarea"
      labelPlacement="stacked"
      placeholder="Ej: Comprar leche"
      [(ngModel)]="newTitle"
      (keyup.enter)="onAdd()"
    ></ion-input>
  </ion-item>

  <ion-button expand="block" class="ion-margin-top" (click)="onAdd()">
    Agregar
  </ion-button>

  <ng-container *ngIf="tasks$ | async as tasks">
    <p *ngIf="tasks.length === 0" class="ion-margin-top">
      No tienes tareas aún.
    </p>

    <ion-list *ngIf="tasks.length > 0" class="ion-margin-top">
      <ion-item *ngFor="let task of tasks; trackBy: trackByTaskId">
        <ion-checkbox
          slot="start"
          [checked]="task.completed"
          (ionChange)="onToggle(task.id)"
        ></ion-checkbox>

        <ion-label>
          <h2 [style.textDecoration]="task.completed ? 'line-through' : 'none'">
            {{ task.title }}
          </h2>
          <p>ID: {{ task.id }}</p>
        </ion-label>

        <ion-button
          slot="end"
          color="danger"
          fill="clear"
          (click)="onDelete(task.id)"
        >
          Eliminar
        </ion-button>
      </ion-item>
    </ion-list>
  </ng-container>
</ion-content>
