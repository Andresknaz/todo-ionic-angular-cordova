<ion-header>
  <ion-toolbar>
    <ion-title>To-Do</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <!-- Formulario: Agregar tarea -->
  <ion-item>
    <ion-input
      label="Nueva tarea"
      labelPlacement="stacked"
      placeholder="Ej: Comprar leche"
      [(ngModel)]="newTitle"
      (keyup.enter)="onAdd()"
    ></ion-input>
  </ion-item>

  <ion-item class="ion-margin-top">
    <ion-select
      label="Categoría"
      labelPlacement="stacked"
      [(ngModel)]="newCategoryId"
    >
      <ion-select-option *ngFor="let c of categories" [value]="c.id">
        {{ c.name }}
      </ion-select-option>
    </ion-select>
  </ion-item>

  <ion-button expand="block" class="ion-margin-top" (click)="onAdd()">
    Agregar
  </ion-button>

  <!-- Filtro -->
  <ion-item class="ion-margin-top">
    <ion-select
      label="Filtrar por categoría"
      labelPlacement="stacked"
      (ionChange)="onFilterCategoryChange($event.detail.value)"
    >
      <ion-select-option [value]="null">Todas</ion-select-option>
      <ion-select-option *ngFor="let c of categories" [value]="c.id">
        {{ c.name }}
      </ion-select-option>
    </ion-select>
  </ion-item>

  <!-- Lista filtrada -->
  <ng-container *ngIf="filteredTasks$ | async as tasks">
    <p *ngIf="tasks.length === 0" class="ion-margin-top">
      No tienes tareas para este filtro.
    </p>

    <ion-list *ngIf="tasks.length > 0" class="ion-margin-top">
      <ion-item *ngFor="let task of tasks; trackBy: trackByTaskId">
        <ion-checkbox
          slot="start"
          [checked]="task.completed"
          (ionChange)="onToggle(task.id)"
        ></ion-checkbox>

        <ion-label>
          <h2 [style.textDecoration]="task.completed ? 'line-through' : 'none'">
            {{ task.title }}
          </h2>
          <p>Categoría: {{ getCategoryName(task.categoryId) }}</p>
        </ion-label>

        <ion-button
          slot="end"
          color="danger"
          fill="clear"
          (click)="onDelete(task.id)"
        >
          Eliminar
        </ion-button>
      </ion-item>
    </ion-list>
  </ng-container>
</ion-content>
